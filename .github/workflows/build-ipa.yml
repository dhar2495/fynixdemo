name: Build iOS IPA
on:
  workflow_dispatch:      # manual — IPA signing needs your Apple Developer account
permissions:
  contents: write
jobs:
  ipa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install -g eas-cli
      - name: Build IPA on EAS
        working-directory: app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        # Requires Apple Developer credentials configured once via `eas credentials`.
        run: |
          npm install
          eas build --platform ios --profile production --non-interactive --wait --output ./SyslaFynix.ipa
      - name: Attach IPA to the release
        uses: softprops/action-gh-release@v2
        with:
          files: app/SyslaFynix.ipa
