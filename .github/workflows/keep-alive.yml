name: Keep API warm
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min — under Render free tier's 15-min idle sleep
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    if: vars.PUBLIC_API_URL != ''
    steps:
      - name: Ping health endpoint
        run: curl -fsS --retry 3 --retry-delay 5 --max-time 90 "${{ vars.PUBLIC_API_URL }}/health"
