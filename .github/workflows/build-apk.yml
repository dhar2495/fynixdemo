name: Build Android APK
on:
  push:
    branches: [main, master]   # every push -> rebuilds and overwrites the rolling "latest" release
    tags: ['v*']                # tag a release for a dedicated versioned release
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Prebuild native Android project
        working-directory: app
        run: |
          npm install
          npx expo prebuild --platform android --non-interactive
      # ponytail: release build with no custom keystore configured — Expo's generated
      # Gradle config falls back to signing with the debug key, so it still installs
      # with no extra setup; switch to your own signing key if this ships to real users
      - name: Build release APK
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease
      - name: Rename artifact
        run: cp app/android/app/build/outputs/apk/release/app-release.apk SyslaFynix.apk
      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: SyslaFynix.apk
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          make_latest: ${{ github.ref_type == 'tag' }}
